<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

body { font-family:'DM Sans',system-ui,sans-serif; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }

<div id="root"></div>
<script>
// Auth check
if (!localStorage.getItem('wp_token')) window.location.href = '/';

<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── API helper ──
const TOKEN = () => localStorage.getItem('wp_token');
const USER = () => JSON.parse(localStorage.getItem('wp_user') || '{}');

async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    ...opts,
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + TOKEN(), ...opts.headers },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 401) { localStorage.clear(); window.location.href = '/'; return; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

// ── Theme ──
const THEMES = {
  dark: { name:"Dark",bg:"#0A0F1C",surface:"#0F1A2E",s2:"#162240",s3:"#1C2D50",border:"rgba(94,177,48,0.15)",t1:"#E8EAF0",t2:"#8B95A8",t3:"#5A6478",lime:"#5EB130",amber:"#E8A317",red:"#D94040",blue:"#6B8EDB",green:"#007A3D",navy:"#1A3C6E" },
  dim: { name:"Dim",bg:"#1A1F2E",surface:"#222840",s2:"#2A3050",s3:"#323860",border:"rgba(94,177,48,0.18)",t1:"#E0E4EE",t2:"#8892A8",t3:"#606880",lime:"#5EB130",amber:"#E8A317",red:"#D94040",blue:"#6B8EDB",green:"#007A3D",navy:"#1A3C6E" },
  light: { name:"Light",bg:"#F4F5F7",surface:"#FFFFFF",s2:"#EDF0F4",s3:"#E2E6EC",border:"rgba(26,60,110,0.12)",t1:"#1A2030",t2:"#4A5568",t3:"#8895A8",lime:"#3D8B1C",amber:"#B8820E",red:"#C03030",blue:"#3B6BC0",green:"#007A3D",navy:"#1A3C6E" },
};

const CATS = [
  {code:"A",title:"Main engines / switchboards / propulsion"},{code:"B",title:"Cargo and gas management"},
  {code:"C",title:"Boilers and economisers"},{code:"D",title:"Deck machinery"},
  {code:"E",title:"Corrosion protection / antifouling"},{code:"F",title:"Miscellaneous"},
  {code:"G",title:"Fans"},{code:"H",title:"Engine room compressors"},
  {code:"I",title:"Pumps"},{code:"J",title:"Chiller systems / package AC"},
  {code:"K",title:"Navigation / bridge electronics"},{code:"CREW",title:"Crew relief (auto)"},
];
const catTitle = c => (CATS.find(x => x.code === c) || {}).title || c;

const dLeft = d => { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / 864e5); };
const dColor = (d, t) => d === null ? t.t3 : d < 0 ? t.red : d <= 14 ? t.amber : d <= 30 ? t.blue : t.lime;
const fmtDue = (joined, mo) => {
  if (!joined) return { date:null, days:null, text:"\u2014" };
  const d = new Date(joined); d.setMonth(d.getMonth() + mo);
  const days = Math.ceil((d - new Date()) / 864e5);
  const dt = d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  const text = days < 0 ? dt+" ("+Math.abs(days)+"d OVERDUE)" : days === 0 ? dt+" (DUE TODAY)" : dt+" ("+days+"d)";
  return { date:d, days, text };
};

// ── Shared components ──
const Pill = ({status, t, onClick}) => {
  const m = {OPEN:t.amber,CLOSED:t.lime,ONGOING:t.blue,"IN HAND":t.amber};
  const c = m[status] || t.amber;
  return <span onClick={onClick} style={{display:"inline-block",padding:"2px 9px",borderRadius:16,fontSize:10,fontWeight:600,background:c+"18",color:c,border:"1px solid "+c+"40",textTransform:"uppercase",cursor:onClick?"pointer":"default",userSelect:"none",whiteSpace:"nowrap"}}>{status}</span>;
};

const Btn = ({children, onClick, variant, t, disabled, style:sx}) => {
  const b = {padding:"5px 12px",borderRadius:5,border:"none",cursor:disabled?"default":"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",opacity:disabled?.4:1,display:"inline-flex",alignItems:"center",gap:4,...sx};
  const v = {primary:{...b,background:t.lime,color:"#0A0F1C"},ghost:{...b,background:"transparent",color:t.t2,border:"1px solid "+t.border}};
  return <button onClick={disabled?undefined:onClick} style={v[variant]||{...b,background:t.s3,color:t.t1}}>{children}</button>;
};

const Cell = ({value, onChange, placeholder, multi, disabled, t}) => {
  const [ed, setEd] = useState(false);
  const [draft, setDraft] = useState(value || '');
  const ref = useRef(null);
  useEffect(() => { if (ed && ref.current) ref.current.focus(); }, [ed]);
  useEffect(() => { setDraft(value || ''); }, [value]);

  if (disabled || !ed) return (
    <div onClick={() => !disabled && setEd(true)} style={{minHeight:24,padding:"4px 6px",borderRadius:3,cursor:disabled?"default":"text",border:"1px solid transparent",color:value?t.t1:t.t3,fontSize:11,lineHeight:1.5}}
      onMouseEnter={e => {if(!disabled) e.currentTarget.style.borderColor=t.lime+"40";}}
      onMouseLeave={e => {e.currentTarget.style.borderColor="transparent";}}>
      {value || placeholder || (disabled ? "\u2014" : "Click to edit...")}
    </div>
  );

  const El = multi ? "textarea" : "input";
  return <El ref={ref} value={draft} onChange={e => setDraft(e.target.value)}
    onBlur={() => { onChange(draft); setEd(false); }}
    onKeyDown={e => { if(e.key==="Escape"){setDraft(value||'');setEd(false);} if(!multi&&e.key==="Enter"){onChange(draft);setEd(false);} }}
    style={{width:"100%",padding:"4px 6px",borderRadius:3,border:"1px solid "+t.lime,background:t.surface,color:t.t1,fontSize:11,fontFamily:"inherit",lineHeight:1.5,resize:multi?"vertical":"none",outline:"none",minHeight:multi?50:24,boxSizing:"border-box"}} />;
};

// ── Main App ──
function App() {
  const user = USER();
  const [theme, setTheme] = useState("light");
  const [vessels, setVessels] = useState([]);
  const [selV, setSelV] = useState(null);
  const [crew, setCrew] = useState([]);
  const [meetings, setMeetings] = useState([]);
  const [curMeeting, setCurMeeting] = useState(null);
  const [templates, setTemplates] = useState([]);
  const [remarks, setRemarks] = useState([]);
  const [actions, setActions] = useState([]);
  const [tab, setTab] = useState("agenda");
  const [loading, setLoading] = useState(true);
  const [adminUsers, setAdminUsers] = useState([]);
  const [adminVessels, setAdminVessels] = useState([]);
  const [showAdminModal, setShowAdminModal] = useState(null); // {type:'user'|'vessel', mode:'add'|'edit', item?}

  const t = THEMES[theme];

  // Load vessels on mount
  useEffect(() => {
    api('/vessels').then(v => { setVessels(v); if (v.length) setSelV(v[0].id); });
    if (user.role === 'admin') {
      api('/admin/users').then(setAdminUsers).catch(() => {});
      api('/vessels').then(setAdminVessels).catch(() => {});
    }
  }, []);

  // Load vessel data when selection changes
  useEffect(() => {
    if (!selV) return;
    setLoading(true);
    Promise.all([
      api('/vessels/' + selV + '/crew'),
      api('/vessels/' + selV + '/meetings'),
      api('/vessels/' + selV + '/actions'),
      api('/vessels/' + selV + '/agenda-templates'),
    ]).then(([c, m, a, tmpl]) => {
      setCrew(c);
      setMeetings(m);
      setActions(a);
      setTemplates(tmpl);
      // Find or create current week's meeting
      const now = new Date();
      const wk = getWeekNumber(now);
      const yr = now.getFullYear();
      const cur = m.find(x => x.week_number === wk && x.year === yr);
      if (cur) {
        setCurMeeting(cur);
        api('/meetings/' + cur.id + '/remarks').then(setRemarks);
      } else {
        api('/vessels/' + selV + '/meetings', { method:'POST', body:{ week_number:wk, year:yr } }).then(mtg => {
          setCurMeeting(mtg);
          api('/meetings/' + mtg.id + '/remarks').then(setRemarks);
          setMeetings(prev => [mtg, ...prev]);
        });
      }
      setLoading(false);
    });
  }, [selV]);

  const getWeekNumber = (d) => {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  };

  const vessel = vessels.find(v => v.id === selV);
  const openCt = actions.filter(a => a.status !== 'CLOSED').length;
  const critCt = actions.filter(a => { const c = (a.condition||'').toLowerCase(); return c.includes('not') || c.includes('un'); }).length;
  const filledCt = remarks.filter(r => r.vessel_remark).length;
  const crewDueCt = crew.filter(c => { const f = fmtDue(c.joined, c.contract_months); return f.days !== null && f.days <= 14; }).length;
  const canEditV = (user.role === 'vessel' || user.role === 'admin') && curMeeting?.status !== 'completed';
  const canEditS = (user.role === 'superintendent' || user.role === 'admin') && curMeeting?.status !== 'draft';
  const canEditActions = user.role !== 'manager';

  const advanceMeeting = async () => {
    if (!curMeeting) return;
    const flow = ['draft','vessel_prep','in_progress','completed'];
    const idx = flow.indexOf(curMeeting.status);
    if (idx >= flow.length - 1) return;
    const next = flow[idx + 1];
    const updated = await api('/meetings/' + curMeeting.id + '/status', { method:'PUT', body:{ status:next } });
    setCurMeeting(updated);
    if (next === 'completed') {
      const newRemarks = await api('/meetings/' + curMeeting.id + '/remarks');
      setRemarks(newRemarks);
    }
  };

  const reopenMeeting = async () => {
    const updated = await api('/meetings/' + curMeeting.id + '/status', { method:'PUT', body:{ status:'in_progress' } });
    setCurMeeting(updated);
  };

  const updateRemark = async (remarkId, field, value) => {
    const body = {};
    body[field] = value;
    await api('/remarks/' + remarkId, { method:'PUT', body });
    setRemarks(prev => prev.map(r => r.id === remarkId ? { ...r, [field]:value } : r));
  };

  const updateAction = async (actionId, updates) => {
    const updated = await api('/actions/' + actionId, { method:'PUT', body:updates });
    setActions(prev => prev.map(a => a.id === actionId ? updated : a));
  };

  const cycleStatus = async (actionId) => {
    if (user.role === 'manager') return;
    const item = actions.find(a => a.id === actionId);
    const order = ['OPEN','ONGOING','IN HAND','CLOSED'];
    const next = order[(order.indexOf(item.status) + 1) % order.length];
    if (next === 'CLOSED') {
      const cond = (item.condition || '').toLowerCase();
      if (cond.includes('not') || cond.includes('un')) {
        if (!confirm('This item is marked "' + item.condition + '". Confirm condition is now satisfactory and close?')) return;
        await updateAction(actionId, { status:'CLOSED', condition:'Satisfactory' });
        return;
      }
      if (!confirm('Close this action item? Confirm condition is satisfactory.')) return;
    }
    await updateAction(actionId, { status:next });
  };

  const deleteAction = async (id) => {
    if (!confirm('Delete this action item?')) return;
    await api('/actions/' + id, { method:'DELETE' });
    setActions(prev => prev.filter(a => a.id !== id));
  };

  const addAction = async (form) => {
    const created = await api('/vessels/' + selV + '/actions', { method:'POST', body:form });
    setActions(prev => [...prev, created]);
  };

  const logout = () => { localStorage.clear(); window.location.href = '/'; };

  const stC = {draft:t.t3,vessel_prep:t.amber,in_progress:t.lime,completed:t.blue};
  const stL = {draft:"Draft",vessel_prep:"Vessel prep",in_progress:"In progress",completed:"Completed"};
  const fB = a => ({padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:a?600:400,background:a?t.s3:"transparent",color:a?t.t1:t.t3,border:a?"1px solid "+t.border:"1px solid transparent",cursor:"pointer",fontFamily:"inherit"});
  const [fCat, setFCat] = useState("ALL");
  const [fSt, setFSt] = useState("ALL");
  const filtAct = actions.filter(a => (fCat==="ALL"||a.category===fCat) && (fSt==="ALL"||a.status===fSt));
  const grp = {};
  filtAct.forEach(a => { if (!grp[a.category]) grp[a.category] = []; grp[a.category].push(a); });

  if (loading && !vessel) return <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",color:t.t2}}>Loading...</div>;

  return (
    <div style={{minHeight:"100vh",background:t.bg,color:t.t1,fontFamily:"'DM Sans',system-ui,sans-serif",display:"flex"}}>
      {/* SIDEBAR */}
      <div style={{width:210,background:t.surface,borderRight:"1px solid "+t.border,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"10px 12px",borderBottom:"1px solid "+t.border,display:"flex",alignItems:"center",gap:8}}>
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACgAAAAbCAIAAACBclo5AAABCGlDQ1BJQ0MgUHJvZmlsZQAAeJxjYGA8wQAELAYMDLl5JUVB7k4KEZFRCuwPGBiBEAwSk4sLGHADoKpv1yBqL+viUYcLcKakFicD6Q9ArFIEtBxopAiQLZIOYWuA2EkQtg2IXV5SUAJkB4DYRSFBzkB2CpCtkY7ETkJiJxcUgdT3ANk2uTmlyQh3M/Ck5oUGA2kOIJZhKGYIYnBncAL5H6IkfxEDg8VXBgbmCQixpJkMDNtbGRgkbiHEVBYwMPC3MDBsO48QQ4RJQWJRIliIBYiZ0tIYGD4tZ2DgjWRgEL7AwMAVDQsIHG5TALvNnSEfCNMZchhSgSKeDHkMyQx6QJYRgwGDIYMZAKbWPz9HbOBQAAACX0lEQVR42u2WS2sUQRSFz62q7nl0ZyYk0QnjBDVoDArxAUFQTHQRBEWCgu4jIu4k+Ad0p2tduNAfkK2IrtRVfEQQomCUEIxgSJDxQcxknOmue110UCGLdOdBEHMXvSiq+e65p+pQxMxYj1JYp/r/wGZ5v8miFVprsAAEKFrUAkFkLcGKIEA9lEgjLXwptJJStCZgERDR90pw4ub4dM0x+Sx5GcdLZz1nNqRLnTK4x4QMTasNZhGj6NaDyWfDM2jyQHPwPXhppFINzeZ0Xx6SwOm4YGYxWr398OXa7RHUUqWCOdLdZLU2aVWphf1d7racsSzxh53M4xevp451+m7Wa29Ln9rvW4CtKrak9u1sTEQFQIkik5m11q/Gpnsu3KuIh0wW8xi6fvBs7xZrWSchq2QXiVT1Z3DlxsNKuYzgGyYnTx72zvUWmSURNeGpZtFafS7Pjrx8R1Xu69168cyB7q4iQARJnEEcryyzZQ4CKyKDV4fQdP79xIyIiIj9a0/8iqWYoqAQKA0AlweObi81drQXwAyi325Fe2QVD5eA5hmuQqXOrlYZAwE0UK7arKGsowBYYC6Eb6DiJecSiq3AKLo/+vXu83LPDu+H1Qr85uOccXRLRpWKuf7d/p0nU41ZZ1OD83iicrzDHzhUsMyKaEWKmUVrNTz6qV7nttbco6fjjqurVucyuhpw3nBzPjU2U3ON4iAsteb37iq0bfZFmFYI/mMeCEA9CI1WSi3YWquHzJxJu1GT0eWUeKOOGyAiAEQpJRBmRJ1E8wwtE0ERMQvRklKXlVwbb64N8L8A/gVyj1deFDes7AAAAABJRU5ErkJggg==" alt="FORCAP" style={{width:28,height:28,borderRadius:4}} />
          <div><div style={{fontSize:12,fontWeight:700,color:t.t1}}>FORCAP®</div><div style={{fontSize:8,color:t.t3}}>Weekly plan</div></div>
        </div>
        <div style={{padding:"6px 10px",borderBottom:"1px solid "+t.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:10,color:t.t2}}>{user.display_name}</span>
          <button onClick={logout} style={{background:"none",border:"none",color:t.t3,cursor:"pointer",fontSize:9,fontFamily:"inherit"}}>Logout</button>
        </div>
        <div style={{padding:"6px 10px",borderBottom:"1px solid "+t.border,display:"flex",gap:3}}>
          {Object.entries(THEMES).map(([k,v]) => (
            <button key={k} onClick={() => setTheme(k)} style={{flex:1,padding:"2px 0",borderRadius:3,fontSize:9,fontWeight:theme===k?600:400,background:theme===k?t.s3:"transparent",color:theme===k?t.t1:t.t3,border:theme===k?"1px solid "+t.border:"1px solid transparent",cursor:"pointer",fontFamily:"inherit"}}>{v.name}</button>
          ))}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"6px 8px"}}>
          <div style={{fontSize:8,fontWeight:600,color:t.t3,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Fleet ({vessels.length})</div>
          {vessels.map(v => (
            <div key={v.id} onClick={() => setSelV(v.id)} style={{padding:"6px 7px",borderRadius:4,cursor:"pointer",marginBottom:1,background:selV===v.id?t.s3:"transparent",borderLeft:selV===v.id?"2px solid "+t.lime:"2px solid transparent"}}>
              <div style={{fontSize:11,fontWeight:selV===v.id?600:400,color:selV===v.id?t.t1:t.t2}}>{v.name}</div>
              <div style={{fontSize:9,color:t.t3}}>{v.vessel_type}</div>
            </div>
          ))}
        </div>
        <div style={{padding:"8px 10px",borderTop:"1px solid "+t.border,fontSize:9,color:t.t3,textAlign:"center"}}>
          Role: {user.role}
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        {/* TOP BAR */}
        <div style={{padding:"8px 18px",borderBottom:"1px solid "+t.border,background:t.surface,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:15,fontWeight:700}}>{vessel?.name}</span>
            <span style={{fontSize:10,color:t.t3}}>IMO {vessel?.imo}</span>
            {curMeeting && <div style={{padding:"2px 9px",borderRadius:12,fontSize:10,fontWeight:600,background:t.s3,color:t.t2,border:"1px solid "+t.border,fontFamily:"'JetBrains Mono',monospace"}}>W{curMeeting.week_number} · {curMeeting.year}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {curMeeting && <div style={{display:"flex",alignItems:"center",gap:2}}>
              {["draft","vessel_prep","in_progress","completed"].map((s,i,arr) => {
                const on = arr.indexOf(curMeeting.status) >= i;
                const cur = curMeeting.status === s;
                return <div key={s} style={{display:"flex",alignItems:"center",gap:2}}>
                  <div style={{width:cur?"auto":6,height:6,borderRadius:cur?7:3,background:on?stC[curMeeting.status]:t.t3,padding:cur?"1px 7px":0,fontSize:8,fontWeight:600,color:t.surface,display:"flex",alignItems:"center"}}>{cur && stL[s]}</div>
                  {i<3 && <div style={{width:10,height:1,background:on?stC[curMeeting.status]:t.t3,opacity:.3}} />}
                </div>;
              })}
            </div>}
            {curMeeting?.status === 'completed' && (user.role === 'admin' || user.role === 'superintendent') && <Btn variant="ghost" t={t} onClick={reopenMeeting}>Reopen</Btn>}
            {curMeeting && curMeeting.status !== 'completed' && <Btn variant="primary" t={t} onClick={advanceMeeting}>{curMeeting.status === 'in_progress' ? 'Close meeting' : 'Advance \u2192'}</Btn>}
          </div>
        </div>

        {/* KPIs */}
        <div style={{display:"flex",gap:8,padding:"10px 18px",flexWrap:"wrap"}}>
          {[
            {l:"Open actions",v:openCt,tot:actions.length,c:t.amber,k:"open"},
            {l:"Agenda filled",v:filledCt,tot:templates.length,c:t.lime,k:"agenda"},
            {l:"Critical",v:critCt,c:t.red,k:"critical"},
            {l:"Crew due \u226414d",v:crewDueCt,c:crewDueCt>0?t.amber:t.lime,k:"crew"},
          ].map((c,i) => (
            <div key={i} onClick={() => { if(c.k==="open"||c.k==="critical") setTab("actions"); else if(c.k==="agenda") setTab("agenda"); }}
              style={{background:t.s2,borderRadius:6,padding:"8px 14px",border:"1px solid "+t.border,minWidth:110,cursor:"pointer"}}>
              <div style={{fontSize:9,color:t.t3,textTransform:"uppercase",letterSpacing:.3}}>{c.l}</div>
              <span style={{fontSize:20,fontWeight:700,color:c.c}}>{c.v}</span>
              {c.tot !== undefined && <span style={{fontSize:10,color:t.t3}}> / {c.tot}</span>}
            </div>
          ))}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"0 18px 18px"}}>

          {/* WEEKLY CALENDAR */}
          {(() => {
            const yr = curMeeting?.year || new Date().getFullYear();
            const completedWks = new Set(meetings.filter(m => m.status === 'completed' && m.year === yr).map(m => m.week_number));
            const activeWk = curMeeting?.week_number;
            // Get Monday of ISO week
            const getMonday = (y, w) => {
              const jan4 = new Date(y, 0, 4);
              const d = jan4.getDay() || 7;
              const mon = new Date(jan4);
              mon.setDate(jan4.getDate() - d + 1 + (w - 1) * 7);
              return mon;
            };
            const fmtShort = (d) => d.getDate() + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
            const weeks = [];
            for (let w = 1; w <= 52; w++) {
              const completed = completedWks.has(w);
              const isCurrent = w === activeWk;
              const isPast = w < (activeWk || 99);
              const missed = isPast && !completed && !isCurrent;
              const mon = getMonday(yr, w);

                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Type</div><select value={vtype} onChange={e=>setVtype(e.target.value)} style={{width:"100%",padding:"6px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:12,fontFamily:"inherit"}}><option>LNG DFDE</option><option>LNG TFDE</option><option>LPG FR</option><option>LPG Semi-Ref</option><option>LPG Pressurised</option></select></div>
                          <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>IMO number</div><input value={imo} onChange={e=>setImo(e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:12,fontFamily:"inherit",boxSizing:"border-box"}} /></div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}><Btn variant="ghost" t={t} onClick={()=>setShowAdminModal(null)}>Cancel</Btn><Btn variant="primary" t={t} onClick={save}>Save</Btn></div>
                    </div>
                  </div>
                );
              };
              return <VesselForm />;
            }
            if (m.type === 'user') {
              const UserForm = () => {
                const [username, setUsername] = useState(m.item?.username || '');
                const [displayName, setDisplayName] = useState(m.item?.display_name || '');
                const [role, setRoleVal] = useState(m.item?.role || 'vessel');
                const [password, setPassword] = useState('');
                const [selVessels, setSelVessels] = useState([]);

                const toggleVessel = (vid) => {
                  setSelVessels(prev => prev.includes(vid) ? prev.filter(x=>x!==vid) : [...prev, vid]);
                };

                const save = async () => {
                  if (!username || !displayName) return;
                  if (m.mode === 'add') {
                    if (!password) return alert('Password required for new user');
                    await api('/admin/users', {method:'POST', body:{username,password,display_name:displayName,role,vessel_ids:selVessels}});
                  } else {
                    const body = {display_name:displayName, role, vessel_ids:selVessels};
                    if (password) body.password = password;
                    await api('/admin/users/'+m.item.id, {method:'PUT', body});
                  }
                  const refreshed = await api('/admin/users');
                  setAdminUsers(refreshed);
                  setShowAdminModal(null);
                };

                return (
                  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{background:t.surface,borderRadius:10,padding:20,maxWidth:500,width:"95%",border:"1px solid "+t.border}}>
                      <div style={{fontSize:14,fontWeight:600,color:t.t1,marginBottom:12}}>{m.mode==='add'?'Add user':'Edit user'}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Username</div><input value={username} onChange={e=>setUsername(e.target.value)} disabled={m.mode==='edit'} style={{width:"100%",padding:"6px 8px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:12,fontFamily:"inherit",boxSizing:"border-box",opacity:m.mode==='edit'?.6:1}} /></div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Display name</div><input value={displayName} onChange={e=>setDisplayName(e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:12,fontFamily:"inherit",boxSizing:"border-box"}} /></div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Role</div><select value={role} onChange={e=>setRoleVal(e.target.value)} style={{width:"100%",padding:"6px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:12,fontFamily:"inherit"}}><option value="admin">Admin</option><option value="superintendent">Superintendent</option><option value="vessel">Vessel</option><option value="manager">Manager</option></select></div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>{m.mode==='edit'?'New password (leave blank to keep)':'Password'}</div><input type="password" value={password} onChange={e=>setPassword(e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:12,fontFamily:"inherit",boxSizing:"border-box"}} /></div>
                      </div>
                      <div style={{marginTop:12}}>
                        <div style={{fontSize:9,color:t.t3,marginBottom:4}}>Assign vessels (click to toggle)</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {adminVessels.map(v => (
                            <button key={v.id} onClick={() => toggleVessel(v.id)} style={{
                              padding:"3px 10px",borderRadius:4,fontSize:10,fontFamily:"inherit",cursor:"pointer",
                              background:selVessels.includes(v.id)?t.lime+"25":"transparent",
                              color:selVessels.includes(v.id)?t.lime:t.t3,
                              border:"1px solid "+(selVessels.includes(v.id)?t.lime+"50":t.border),
                              fontWeight:selVessels.includes(v.id)?600:400,
                            }}>{v.name}</button>
                          ))}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}><Btn variant="ghost" t={t} onClick={()=>setShowAdminModal(null)}>Cancel</Btn><Btn variant="primary" t={t} onClick={save}>Save</Btn></div>
                    </div>
                  </div>
                );
              };
              return <UserForm />;
            }
            if (m.type === 'action') {
              const ActionForm = () => {
                const [cat, setCatVal] = useState(m.item?.category || 'A');
                const [eq, setEq] = useState(m.item?.equipment || '');
                const [cond, setCond] = useState(m.item?.condition || 'Satisfactory');
                const [actionPlan, setActionPlan] = useState(m.item?.action_plan || '');
                const [status, setStatusVal] = useState(m.item?.status || 'OPEN');
                const [reported, setReported] = useState(m.item?.date_reported?.slice(0,10) || new Date().toISOString().slice(0,10));
                const [suptCmt, setSuptCmt] = useState(m.item?.supt_comment || '');
                const save = async () => {
                  if (!eq) return alert('Equipment name required');
                  const body = { category:cat, equipment:eq, condition:cond, action_plan:actionPlan, status, date_reported:reported, supt_comment:suptCmt };
                  if (m.mode === 'add') { await addAction(body); }
                  else { await updateAction(m.item.id, body); }
                  setShowAdminModal(null);
                };
                return (
                  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{background:t.surface,borderRadius:10,padding:20,maxWidth:520,width:"95%",border:"1px solid "+t.border}}>
                      <div style={{fontSize:14,fontWeight:600,color:t.t1,marginBottom:12}}>{m.mode==='add'?'New action item':'Edit action item'}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Category</div><select value={cat} onChange={e=>setCatVal(e.target.value)} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit"}}>{CATS.filter(c=>c.code!=='CREW').map(c=><option key={c.code} value={c.code}>{c.code} {"\u2014"} {c.title}</option>)}</select></div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Equipment</div><input value={eq} onChange={e=>setEq(e.target.value)} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit",boxSizing:"border-box"}} /></div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Condition</div><select value={cond} onChange={e=>setCond(e.target.value)} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit"}}><option>Satisfactory</option><option>NOT SATISFACTORY</option></select></div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Status</div><select value={status} onChange={e=>setStatusVal(e.target.value)} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit"}}>{['OPEN','ONGOING','IN HAND','CLOSED'].map(s=><option key={s}>{s}</option>)}</select></div>
                        <div style={{gridColumn:"1/-1"}}><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Action plan</div><textarea value={actionPlan} onChange={e=>setActionPlan(e.target.value)} rows={3} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box"}} /></div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Date reported</div><input type="date" value={reported} onChange={e=>setReported(e.target.value)} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit",boxSizing:"border-box"}} /></div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Supt comment</div><input value={suptCmt} onChange={e=>setSuptCmt(e.target.value)} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit",boxSizing:"border-box"}} /></div>
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}><Btn variant="ghost" t={t} onClick={()=>setShowAdminModal(null)}>Cancel</Btn><Btn variant="primary" t={t} onClick={save}>Save</Btn></div>
                    </div>
                  </div>
                );
              };
              return <ActionForm />;
            }
            if (m.type === 'agenda') {
              const AgendaForm = () => {
                const [title, setTitle] = useState(m.item?.title || '');
                const [focus, setFocus] = useState(m.item?.focus || '');
                const [itemNum, setItemNum] = useState(m.item?.item_number || (templates.length + 1));
                const save = async () => {
                  if (!title) return alert('Title required');
                  if (m.mode === 'add') {
                    const created = await api('/vessels/' + selV + '/agenda-templates', { method:'POST', body:{ item_number:itemNum, title, focus, meeting_id:curMeeting?.id } });
                    setTemplates(prev => [...prev, created].sort((a,b) => a.item_number - b.item_number));
                  } else {
                    const updated = await api('/agenda-templates/' + m.item.id, { method:'PUT', body:{ item_number:itemNum, title, focus } });
                    setTemplates(prev => prev.map(t => t.id === m.item.id ? updated : t));
                  }
                  setShowAdminModal(null);
                  if (curMeeting) { const r = await api('/meetings/' + curMeeting.id + '/remarks'); setRemarks(r); }
                };
                return (
                  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{background:t.surface,borderRadius:10,padding:20,maxWidth:440,width:"95%",border:"1px solid "+t.border}}>
                      <div style={{fontSize:14,fontWeight:600,color:t.t1,marginBottom:12}}>{m.mode==='add'?'New agenda item':'Edit agenda item'}</div>
                      <div style={{display:"grid",gap:10}}>
                        <div style={{display:"grid",gridTemplateColumns:"60px 1fr",gap:10}}>
                          <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Item #</div><input type="number" value={itemNum} onChange={e=>setItemNum(parseInt(e.target.value)||1)} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit",boxSizing:"border-box"}} /></div>
                          <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Title</div><input value={title} onChange={e=>setTitle(e.target.value)} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit",boxSizing:"border-box"}} /></div>
                        </div>
                        <div><div style={{fontSize:9,color:t.t3,marginBottom:2}}>Key focus areas</div><textarea value={focus} onChange={e=>setFocus(e.target.value)} rows={2} style={{width:"100%",padding:"5px",borderRadius:4,border:"1px solid "+t.border,background:t.s2,color:t.t1,fontSize:11,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box"}} /></div>
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}><Btn variant="ghost" t={t} onClick={()=>setShowAdminModal(null)}>Cancel</Btn><Btn variant="primary" t={t} onClick={save}>Save</Btn></div>
                    </div>
                  </div>
                );
              };
              return <AgendaForm />;
            }
            return null;
          })()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
